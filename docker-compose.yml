services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      # Keep SQLite on a named volume, outside the bind-mounted source tree, so
      # the database survives container rebuilds and `docker compose down`
      # (everything except `down -v`).
      - DB_PATH=/data/community.db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - community-data:/data
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm dev"

  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      # Reach the web app over the compose network, not localhost.
      # This overrides BOT_TARGET_URL from .env.
      - BOT_TARGET_URL=http://app:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm bot"
    depends_on:
      - app

volumes:
  community-data:
