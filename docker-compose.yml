services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - DB_PATH=/data/community.db
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - community-data:/data
    command: sh -c "CI=true pnpm install --no-frozen-lockfile && pnpm dev"

  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - BOT_TARGET_URL=http://app:3000
    volumes:
      - .:/app
      - bot_node_modules:/app/node_modules
      - community-data:/data
    command: sh -c "CI=true pnpm install --no-frozen-lockfile && pnpm bot"
    depends_on:
      - app

volumes:
  community-data:   # SQLite DB — never wipe this unless intentionally resetting
  app_node_modules: # app deps cache — safe to wipe when packages change
  app_next:         # Next.js build cache
  bot_node_modules: # bot deps cache
