packages: []

# Supply-chain hardening
blockExoticSubdeps: true       # block deps installed from non-registry sources (git, file, http)
minimumReleaseAge: 10080       # require packages to be 7 days old before installing (minutes)
# trustPolicy: no-downgrade — disabled: next-auth@5.0.0-beta.31 lacks provenance attestation
# Re-enable when Auth.js v5 stable ships with provenance

onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@mendable/firecrawl-js@4.28.1'
  # 4 high-severity Next.js advisories (middleware/proxy bypass, Server Actions
  # DoS, Server Actions SSRF, rewrites SSRF) fixed only in 16.2.11+ — first-party
  # Vercel release, can't wait out the normal 7-day aging window. @next/* are
  # next's own per-platform binary/env subpackages, published in lockstep.
  - 'next@16.2.11'
  - '@next/env@16.2.11'
  - '@next/swc-darwin-arm64@16.2.11'
  - '@next/swc-darwin-x64@16.2.11'
  - '@next/swc-linux-arm64-gnu@16.2.11'
  - '@next/swc-linux-arm64-musl@16.2.11'
  - '@next/swc-linux-x64-gnu@16.2.11'
  - '@next/swc-linux-x64-musl@16.2.11'
  - '@next/swc-win32-arm64-msvc@16.2.11'
  - '@next/swc-win32-x64-msvc@16.2.11'
  # 1 critical (email-normalizer homoglyph bypass) + 2 high Auth.js advisories
  # fixed only in next-auth 5.0.0-beta.32 / @auth/core 0.41.3 — first-party
  # Auth.js release, can't wait out the normal 7-day aging window.
  - 'next-auth@5.0.0-beta.32'
  - '@auth/core@0.41.3'
overrides:
  ws: '>=8.21.0'
  shell-quote: '>=1.8.5'   # GHSA-395f-4hp3-45gv — >=1.8.4 wasn't actually patched, 1.8.4 itself is vulnerable
  undici: '^6.27.0'
  postcss: '>=8.5.10'   # CVE-2026-41305 — next/next-auth pin 8.4.31 transitively
  js-yaml: '>=4.3.0'   # GHSA-52cp-r559-cp3m — quadratic CPU via YAML merge-key chains, pulled in by eslint's @eslint/eslintrc
  sharp: '>=0.35.0'   # GHSA-f88m-g3jw-g9cj — inherited libvips CVEs (2026-33327/33328/35590/35591), pulled in by next and next-auth>next; single resolved version in this tree so an open range is safe here
  # GHSA-3jxr-9vmj-r5cp — one advisory covers two separately-vulnerable brace-expansion
  # lines in this tree. Both rules must stay major-capped (^, not >=) — an open ">="
  # range lets pnpm satisfy both overrides with a single shared 5.x version, which
  # breaks minimatch@3.1.5 (it calls a 1.x-only API on brace-expansion) and takes
  # ESLint down with it.
  'minimatch@3>brace-expansion': '^1.1.16'
  'minimatch@^10>brace-expansion': '^5.0.7'
