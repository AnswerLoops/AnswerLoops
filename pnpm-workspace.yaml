packages: []

# Supply-chain hardening
blockExoticSubdeps: true       # block deps installed from non-registry sources (git, file, http)
minimumReleaseAge: 10080       # require packages to be 7 days old before installing (minutes)
# trustPolicy: no-downgrade — disabled: next-auth@5.0.0-beta.31 lacks provenance attestation
# Re-enable when Auth.js v5 stable ships with provenance

onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@mendable/firecrawl-js@4.28.1'
overrides:
  ws: '>=8.21.0'
  shell-quote: '>=1.8.4'
  undici: '^6.27.0'
